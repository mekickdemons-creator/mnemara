        ```

  code_explanation:
    - id: ce_01
      difficulty: easy
      prompt: |
        Explain what this Python function does, step by step. Also explain
        why someone would use it and what its time complexity is.

        ```python
        def bisect_left(a, x, lo=0, hi=None):
            if hi is None:
                hi = len(a)
            while lo < hi:
                mid = (lo + hi) // 2
                if a[mid] < x:
                    lo = mid + 1
                else:
                    hi = mid
            return lo
        ```

    - id: ce_02
      difficulty: medium
      prompt: |
        Explain what this Python one-liner does and whether it has any
        gotchas or edge cases:

        ```python
        result = {k: v for d in dicts for k, v in d.items()}
        ```

    - id: ce_03
      difficulty: medium
      prompt: |
        Explain this Python decorator and its output:

        ```python
        from functools import wraps

        def memoize(fn):
            cache = {}
            @wraps(fn)
            def wrapper(*args):
                if args not in cache:
                    cache[args] = fn(*args)
                return cache[args]
            return wrapper

        @memoize
        def fib(n):
            return n if n < 2 else fib(n-1) + fib(n-2)

        print(fib(10))
        ```

