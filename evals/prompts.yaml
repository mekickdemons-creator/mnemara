    - id: rf_03
      difficulty: hard
      prompt: |
        Refactor this class to use proper Python patterns. The class should
        still be a working cache but should be cleaner:

        ```python
        class Cache:
            def __init__(self):
                self.d = {}
                self.keys_list = []

            def add(self, k, v):
                if k in self.d:
                    self.keys_list.remove(k)
                self.d[k] = v
                self.keys_list.append(k)

            def get(self, k):
                if k not in self.d:
                    return -1
                self.keys_list.remove(k)
                self.keys_list.append(k)
                return self.d[k]

            def remove_oldest(self):
                k = self.keys_list[0]
                del self.d[k]
                del self.keys_list[0]
        ```

  debugging:
    - id: db_01
      difficulty: easy
      prompt: |
        This code is supposed to return the sum of all numbers in a nested
        list, but it has a bug. What's wrong and how do you fix it?

        ```python
        def nested_sum(lst):
            total = 0
            for item in lst:
                if isinstance(item, list):
                    total += nested_sum(item)
                else:
                    total = total + item
            return total

        print(nested_sum([1, [2, [3, 4]], 5]))  # Expected: 15
        print(nested_sum([]))                    # Expected: 0
        print(nested_sum([1, "two", 3]))         # Should this fail?
        ```

    - id: db_02
      difficulty: medium
      prompt: |
        This Python code has a subtle concurrency bug. Find it and propose
        a fix:

        ```python
        import threading

        counter = 0

        def increment():
            global counter
            for _ in range(100000):
                counter += 1

        threads = [threading.Thread(target=increment) for _ in range(5)]
        for t in threads:
            t.start()
        for t in threads:
            t.join()

        print(counter)  # Expected: 500000, but often gets a lower number
        ```

    - id: db_03
      difficulty: hard
      prompt: |
        This async Python function has a subtle bug that causes it to
        occasionally hang. Identify the bug and fix it:

        ```python
        import asyncio

        async def producer(queue, items):
            for item in items:
                await queue.put(item)

        async def consumer(queue):
            results = []
            while True:
                item = await asyncio.wait_for(queue.get(), timeout=1.0)
                results.append(item)
            return results

        async def main():
            queue = asyncio.Queue()
            items = list(range(10))
            await asyncio.gather(
                producer(queue, items),
                consumer(queue),
            )
        ```

