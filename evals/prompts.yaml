# Gemma 4 evaluation prompts
# Grouped by category, 3-5 prompts each.
# Run with: python evals/run_eval.py

categories:

  code_generation:
    - id: cg_01
      difficulty: easy
      prompt: |
        Write a Python function called `flatten` that takes a nested list of
        arbitrary depth and returns a flat list of all elements.
        Include a docstring and a brief usage example in a comment.

    - id: cg_02
      difficulty: medium
      prompt: |
        Write a Python class `LRUCache` with methods `get(key)` and
        `put(key, value)` using only the standard library. The cache should
        evict the least-recently-used entry when it exceeds capacity.
        Include type hints.

    - id: cg_03
      difficulty: medium
      prompt: |
        Write a Python async function `fetch_all(urls: list[str]) -> list[dict]`
        that uses `aiohttp` to fetch all URLs concurrently and returns a list
        of dicts with keys `url`, `status`, and `body` (first 200 chars).
        Handle connection errors gracefully.

    - id: cg_04
      difficulty: hard
      prompt: |
        Write a Python decorator `@retry(max_attempts=3, backoff=2.0)` that
        retries a function on exception with exponential backoff.
        Support both sync and async functions. Include a usage example.

